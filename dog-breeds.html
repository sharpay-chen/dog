<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>狗狗品種圖鑑</title>
  <style>
    :root {
      --bg:        #EDE5D8;
      --surface:   #F5F0E8;
      --card-1:    #C4A4A4;
      --card-2:    #9CAF9C;
      --card-3:    #9AAAB4;
      --card-4:    #C4967A;
      --card-5:    #B5A8C4;
      --card-6:    #A8B8A8;
      --text-dark: #5C534A;
      --text-mid:  #7A6F65;
      --text-light:#A89D93;
      --accent:    #C4967A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Noto Serif TC', serif;
      background-color: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background-color: var(--surface);
      border-bottom: 2px solid #D4C5B0;
      padding: 48px 24px 36px;
      text-align: center;
    }

    header .paw { font-size: 2rem; letter-spacing: 8px; opacity: .55; }

    header h1 {
      font-size: 2.6rem;
      font-weight: normal;
      color: var(--text-dark);
      margin: 12px 0 8px;
      letter-spacing: 4px;
    }

    header p {
      font-size: 1rem;
      color: var(--text-light);
      letter-spacing: 2px;
    }

    /* ── Filter bar ── */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 32px 24px 16px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1.5px solid #D4C5B0;
      color: var(--text-mid);
      padding: 8px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: .9rem;
      letter-spacing: 1px;
      transition: all .25s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Grid ── */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(92,83,74,.08);
      transition: transform .3s, box-shadow .3s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 32px rgba(92,83,74,.14);
    }

    /* colour strip per card */
    .card-strip {
      height: 6px;
    }
    .card:nth-child(6n+1) .card-strip { background: var(--card-1); }
    .card:nth-child(6n+2) .card-strip { background: var(--card-2); }
    .card:nth-child(6n+3) .card-strip { background: var(--card-3); }
    .card:nth-child(6n+4) .card-strip { background: var(--card-4); }
    .card:nth-child(6n+5) .card-strip { background: var(--card-5); }
    .card:nth-child(6n+0) .card-strip { background: var(--card-6); }

    .card-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    /* emoji fallback image */
    .card-emoji {
      width: 100%;
      height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      background: linear-gradient(135deg, #EDE5D8 60%, #D4C5B0);
    }

    .card-body {
      padding: 22px 24px 26px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: .72rem;
      letter-spacing: 1px;
      padding: 3px 12px;
      border-radius: 999px;
      border: 1px solid currentColor;
      opacity: .75;
    }

    .tag-size   { color: #9CAF9C; }
    .tag-origin { color: #9AAAB4; }
    .tag-type   { color: #C4A4A4; }

    .card-name {
      font-size: 1.35rem;
      font-weight: normal;
      color: var(--text-dark);
      letter-spacing: 1px;
    }

    .card-name span {
      display: block;
      font-size: .8rem;
      color: var(--text-light);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .card-desc {
      font-size: .9rem;
      color: var(--text-mid);
      line-height: 1.7;
    }

    /* traits bar */
    .traits { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

    .trait-row { display: flex; align-items: center; gap: 10px; }

    .trait-label {
      font-size: .75rem;
      color: var(--text-light);
      width: 52px;
      flex-shrink: 0;
    }

    .trait-bar {
      flex: 1;
      height: 5px;
      background: #DDD7CE;
      border-radius: 99px;
      overflow: hidden;
    }

    .trait-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width .6s ease;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 28px;
      color: var(--text-light);
      font-size: .82rem;
      letter-spacing: 1px;
      border-top: 1px solid #D4C5B0;
    }
  </style>
</head>
<body>

<div class="grid" id="grid"></div>

    traits: { 活潑: 82, 親人: 88, 訓練: 85, 護衛: 65 }

];

const grid = document.getElementById('grid');

function buildCard(dog) {
  const maxVal = 100;
  const traitRows = Object.entries(dog.traits).map(([k,v]) =>
    `<div class="trait-row">
      <div class="trait-label">${k}</div>
      <div class="trait-bar"><div class="trait-fill" style="width:${v}%"></div></div>
    </div>`
  ).join('');

  return `
    <div class="card" data-size="${dog.size}">
      <div class="card-strip"></div>
      <div class="card-emoji">${dog.emoji}</div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-size">${dog.size}型</span>
          <span class="tag tag-origin">${dog.origin}</span>
          <span class="tag tag-type">${dog.type}</span>
        </div>
        <div class="card-name">
          ${dog.name}
          <span>${dog.eng}</span>
        </div>
        <div class="card-desc">${dog.desc}</div>
        <div class="traits">${traitRows}</div>
      </div>
    </div>`;
}

dogs.forEach(d => grid.insertAdjacentHTML('beforeend', buildCard(d)));

function filterCards(size, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    card.style.display = (size === 'all' || card.dataset.size === size) ? '' : 'none';
  });
}
</script>

</html>
